name: Build and Release

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'

jobs:
  # 任务1: 为Windows打包
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-pack.txt

      # 不再下载 Playwright 浏览器（应用启动时自动下载）

      - name: download Pandoc (Windows)
        shell: pwsh
        run: |
          mkdir pandoc
          curl -L -o pandoc.zip https://github.com/jgm/pandoc/releases/download/3.9.0.2/pandoc-3.9.0.2-windows-x86_64.zip
          7z x pandoc.zip -opandoc_temp -y
          Get-ChildItem -Path pandoc_temp -Recurse -Filter pandoc.exe | Move-Item -Destination pandoc\pandoc.exe

      - name: build exe
        shell: pwsh
        run: |
          flet pack gui/__main__.py --name DoubaoExport --add-data "config.yaml;." --add-data "src;src" --add-data "pandoc;pandoc" 2>&1

      - name: upload dist
        uses: actions/upload-artifact@v4
        with:
          name: DoubaoExport-Windows
          path: dist/

  # 任务2: 为macOS打包
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-pack.txt

      # 不再下载 Playwright 浏览器

      - name: download Pandoc (macOS)
        run: |
          mkdir -p pandoc
          curl -L -o pandoc.zip https://github.com/jgm/pandoc/releases/download/3.9.0.2/pandoc-3.9.0.2-x86_64-macOS.zip
          unzip pandoc.zip -d pandoc_temp
          mv pandoc_temp/pandoc-*/bin/pandoc pandoc/pandoc
          chmod +x pandoc/pandoc

      - name: build app
        run: |
          flet pack gui/__main__.py --name DoubaoExport --add-data "config.yaml:." --add-data "src:src" --add-data "pandoc:pandoc" 2>&1

      - name: upload dist
        uses: actions/upload-artifact@v4
        with:
          name: DoubaoExport-macOS
          path: dist/
