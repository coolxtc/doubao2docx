name: Build and Release

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'

jobs:
  # Windows 构建
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-pack.txt

      - name: 下载 Playwright Chromium
        shell: pwsh
        run: |
          $env:PLAYWRIGHT_BROWSERS_PATH = "${{ github.workspace }}\playwright_browsers"
          playwright install chromium

      - name: 下载 Pandoc (Windows)
        shell: pwsh
        run: |
          curl -L -o pandoc.zip https://github.com/jgm/pandoc/releases/download/3.9.0.2/pandoc-3.9.0.2-windows-x86_64.zip
          7z x pandoc.zip -opandoc_temp -y
          Get-ChildItem -Path pandoc_temp -Recurse -Filter pandoc.exe | Move-Item -Destination .\pandoc.exe

      - name: 打包 & 整理 (Windows)
        shell: pwsh
        run: |
          # 打包为目录模式，不内嵌大型二进制文件
          flet pack gui/__main__.py --name DoubaoExport --onedir --add-data "config.yaml;." --add-data "src;src"
          # 复制 pandoc.exe 和浏览器到 dist\DoubaoExport\
          Copy-Item -Path .\pandoc.exe -Destination dist\DoubaoExport\
          Copy-Item -Recurse -Path .\playwright_browsers -Destination dist\DoubaoExport\
          # 创建 zip 压缩包
          Compress-Archive -Path dist\DoubaoExport\* -DestinationPath DoubaoExport-windows.zip

      - name: 上传 Windows 产物
        uses: actions/upload-artifact@v4
        with:
          name: DoubaoExport-Windows
          path: DoubaoExport-windows.zip

  # macOS 构建
  build-macos:
    runs-on: macos-26-intel   # Intel Mac 构建（兼容性更好）
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-pack.txt

      - name: 下载 Playwright Chromium
        run: |
          export PLAYWRIGHT_BROWSERS_PATH="${{ github.workspace }}/playwright_browsers"
          playwright install chromium

      - name: 下载 Pandoc (macOS)
        run: |
          curl -L -o pandoc.zip https://github.com/jgm/pandoc/releases/download/3.9.0.2/pandoc-3.9.0.2-x86_64-macOS.zip
          unzip pandoc.zip -d pandoc_temp
          mv pandoc_temp/pandoc-*/bin/pandoc ./pandoc
          chmod +x ./pandoc
          rm -rf pandoc_temp pandoc.zip

      - name: 打包 & 嵌入资源
        run: |
          export PYINSTALLER_CODESIGN_IDENTITY=""
          flet pack gui/__main__.py --name DoubaoExport --add-data "config.yaml:." --add-data "src:src"
          cp ./pandoc dist/DoubaoExport.app/Contents/MacOS/pandoc
          cp -r playwright_browsers dist/DoubaoExport.app/Contents/MacOS/
          # 创建 macOS 压缩包
          tar -czf DoubaoExport-macos.tar.gz -C dist DoubaoExport.app

      - name: 上传 macOS 产物
        uses: actions/upload-artifact@v4
        with:
          name: DoubaoExport-macOS
          path: DoubaoExport-macos.tar.gz

  # 发布到 Release
  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: DoubaoExport-Windows
          path: .

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: DoubaoExport-macOS
          path: .

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            DoubaoExport-windows.zip
            DoubaoExport-macos.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
