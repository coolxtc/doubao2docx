name: Build and Release

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'

jobs:
  # 任务1: 为Windows打包
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-pack.txt

      - name: 下载 Playwright Chromium
        shell: pwsh
        run: |
          $env:PLAYWRIGHT_BROWSERS_PATH = "${{ github.workspace }}\playwright_browsers"
          playwright install chromium

      - name: 下载 Pandoc (Windows)
        shell: pwsh
        run: |
          mkdir pandoc
          curl -L -o pandoc.zip https://github.com/jgm/pandoc/releases/download/3.9.0.2/pandoc-3.9.0.2-windows-x86_64.zip
          7z x pandoc.zip -opandoc_temp -y
          Get-ChildItem -Path pandoc_temp -Recurse -Filter pandoc.exe | Move-Item -Destination pandoc\pandoc.exe

      - name: 打包应用
        shell: pwsh
        run: |
          flet pack gui/__main__.py --name DoubaoExport --add-data "config.yaml;." --add-data "src;src" --add-data "data;data" --add-data "playwright_browsers;playwright_browsers" --add-data "pandoc;pandoc" 2>&1

      - name: 上传 Windows 产物
        uses: actions/upload-artifact@v4
        with:
          name: DoubaoExport-Windows
          path: dist/

  # 任务2: 为macOS打包
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-pack.txt

      - name: 下载 Playwright Chromium
        run: |
          export PLAYWRIGHT_BROWSERS_PATH="${{ github.workspace }}/playwright_browsers"
          playwright install chromium

      - name: 下载 Pandoc (macOS)
        run: |
          mkdir -p pandoc
          curl -L -o pandoc.zip https://github.com/jgm/pandoc/releases/download/3.9.0.2/pandoc-3.9.0.2-x86_64-macOS.zip
          unzip pandoc.zip -d pandoc_temp
          mv pandoc_temp/pandoc pandoc/pandoc
          chmod +x pandoc/pandoc

      - name: 打包应用
        run: |
          flet pack gui/__main__.py --name DoubaoExport --add-data "config.yaml:." --add-data "src:src" --add-data "data:data" --add-data "playwright_browsers:playwright_browsers" --add-data "pandoc:pandoc" 2>&1

      - name: 上传 macOS 产物
        uses: actions/upload-artifact@v4
        with:
          name: DoubaoExport-macOS
          path: dist/
