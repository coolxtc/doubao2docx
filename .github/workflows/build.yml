name: Build and Release

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'

jobs:
  # 任务1: 为Windows打包
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-pack.txt

      - name: 下载 Playwright Chromium（用于内置打包）
        shell: pwsh
        run: |
          $env:PLAYWRIGHT_BROWSERS_PATH = "${{ github.workspace }}\playwright_browsers"
          playwright install chromium

      - name: 下载 Pandoc (Windows)
        shell: pwsh
        run: |
          curl -L -o pandoc.zip https://github.com/jgm/pandoc/releases/download/3.9.0.2/pandoc-3.9.0.2-windows-x86_64.zip
          7z x pandoc.zip -opandoc_temp -y
          Get-ChildItem -Path pandoc_temp -Recurse -Filter pandoc.exe | Move-Item -Destination .\pandoc.exe

      - name: 打包并内置资源 (Windows)
        shell: pwsh
        run: |
          flet pack gui/__main__.py --name DoubaoExport --add-data "config.yaml;." --add-data "src;src" --add-data "pandoc.exe;." --add-data "playwright_browsers;playwright_browsers" -- --console 2>&1

      - name: 上传 Windows 产物
        uses: actions/upload-artifact@v4
        with:
          name: DoubaoExport-Windows
          path: dist/

  # 任务2: 为macOS打包
  build-macos:
    runs-on: macos-26-intel   # Intel Mac 构建（兼容性更好）
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-pack.txt

      - name: 下载 Playwright Chromium（用于内置打包）
        run: |
          export PLAYWRIGHT_BROWSERS_PATH="${{ github.workspace }}/playwright_browsers"
          playwright install chromium

      - name: 下载 Pandoc (macOS)
        run: |
          curl -L -o pandoc.zip https://github.com/jgm/pandoc/releases/download/3.9.0.2/pandoc-3.9.0.2-x86_64-macOS.zip
          unzip pandoc.zip -d pandoc_temp
          mv pandoc_temp/pandoc-*/bin/pandoc ./pandoc
          chmod +x ./pandoc
          rm -rf pandoc_temp pandoc.zip

      - name: 打包并嵌入资源
        run: |
          export PYINSTALLER_CODESIGN_IDENTITY=""
          flet pack gui/__main__.py --name DoubaoExport --add-data "config.yaml:." --add-data "src:src"
          # 将 pandoc 和浏览器复制到 App Bundle 内部
          cp ./pandoc dist/DoubaoExport.app/Contents/MacOS/pandoc
          cp -r playwright_browsers dist/DoubaoExport.app/Contents/MacOS/

      - name: 上传 macOS 产物
        uses: actions/upload-artifact@v4
        with:
          name: DoubaoExport-macOS
          path: dist/

  # 新增发布任务
  release:
    needs: [build-windows, build-macos]  # 等待两个构建完成
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')  # 仅在推送标签时触发
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: DoubaoExport-Windows
          path: artifacts/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: DoubaoExport-macOS
          path: artifacts/macos

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            artifacts/windows/**
            artifacts/macos/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
